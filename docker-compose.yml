version: '3.8'

services:
  nexus360:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus360_app
    restart: always
    environment:
      - NODE_ENV=production
      # Map the database URL to the internal mounted volume path
      - DATABASE_URL=file:/app/data/dev.db
      # Add any other environment variables needed for production below
      - SESSION_PASSWORD=complex_password_at_least_32_characters_long
    volumes:
      # This ensures the SQLite database persists between container restarts
      - nexus360_data:/app/data
    
    # === CONFIGURAÇÃO TRAEFIK ===
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus360.rule=Host(`nexus360.workmanos.com.br`)"
      - "traefik.http.routers.nexus360.entrypoints=websecure"
      - "traefik.http.routers.nexus360.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexus360.loadbalancer.server.port=3000"
    
    networks:
      - rogartwork

volumes:
  nexus360_data:

networks:
  rogartwork:
    external: true
